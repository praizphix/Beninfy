<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3e004c" />
    <title>Offline | Beninfy</title>
    <style>
      :root {
        color: #17111a;
        background: #f4f2f8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 20px 60px rgba(62, 0, 76, 0.12);
      }

      .top {
        height: 6px;
        background: linear-gradient(90deg, #3e004c, #7b3f89, #e0b94f);
      }

      .content {
        padding: 32px 24px;
        text-align: center;
      }

      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        background: #f7eff8;
        color: #3e004c;
        font-size: 34px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        color: #3e004c;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 10px 0 0;
        color: #6b6270;
        font-size: 14px;
        line-height: 1.6;
      }

      button {
        margin-top: 24px;
        border: 0;
        border-radius: 14px;
        background: #3e004c;
        color: white;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        padding: 13px 20px;
        box-shadow: 0 12px 24px rgba(62, 0, 76, 0.2);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="top"></div>
      <div class="content">
        <div class="icon">!</div>
        <h1>You are offline</h1>
        <p>Your Beninfy dashboard is installed, but this page needs a connection. Check your internet and try again.</p>
        <button type="button" onclick="window.location.reload()">Try again</button>
      </div>
    </main>
  </body>
</html>
